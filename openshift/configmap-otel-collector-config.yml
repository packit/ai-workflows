apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
            # default 20 MiB is too small for non-reasoning agent runs
            max_request_body_size: 104857600  # 100 MiB
    exporters:
      otlphttp/phoenix:
        endpoint: http://phoenix:6006
      otlphttp/trace-server:
        endpoint: http://localhost:8080
        encoding: json
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlphttp/phoenix, otlphttp/trace-server]
