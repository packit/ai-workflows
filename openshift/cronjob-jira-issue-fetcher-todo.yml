apiVersion: batch/v1
kind: CronJob
metadata:
  name: jira-issue-fetcher-todo
  labels:
    app: jira-issue-fetcher-todo
    component: scheduler
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes — picks up ymir_todo maintainer requests promptly
  concurrencyPolicy: Forbid  # Prevent overlapping runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  suspend: false
  jobTemplate:
    metadata:
      labels:
        app: jira-issue-fetcher-todo
        component: job
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 240  # 4 minutes max runtime (cron is */5, must not overlap)
      template:
        metadata:
          labels:
            app: jira-issue-fetcher-todo
            component: pod
        spec:
          restartPolicy: Never
          containers:
          - name: jira-issue-fetcher-env
            image: 'jira-issue-fetcher:prod'
            imagePullPolicy: Always
            envFrom:
            - configMapRef:
                name: endpoints-env
            - configMapRef:
                name: jira-env
            - secretRef:
                name: jira-env
            - configMapRef:
                name: jira-issue-fetcher-env
            - configMapRef:
                name: jira-issue-fetcher-todo-env
            resources:
              limits:
                cpu: "200m"
                memory: "128Mi"
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop:
                - ALL
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          dnsPolicy: ClusterFirst
          schedulerName: default-scheduler
          terminationGracePeriodSeconds: 30
