apiVersion: batch/v1
kind: CronJob
metadata:
  name: jira-issue-fetcher
  labels:
    app: jira-issue-fetcher
    component: scheduler
spec:
  schedule: "0 8 * * *"  # Daily at 8am UTC — automated CVE batch
  concurrencyPolicy: Forbid  # Prevent overlapping runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  suspend: false
  jobTemplate:
    metadata:
      labels:
        app: jira-issue-fetcher
        component: job
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600  # 10 minutes max runtime
      template:
        metadata:
          labels:
            app: jira-issue-fetcher
            component: pod
        spec:
          restartPolicy: Never
          containers:
          - name: jira-issue-fetcher-env
            image: 'jira-issue-fetcher:prod'
            imagePullPolicy: IfNotPresent
            envFrom:
            - configMapRef:
                name: endpoints-env
            - configMapRef:
                name: jira-env
            - secretRef:
                name: jira-env
            - configMapRef:
                name: jira-issue-fetcher-env
            - configMapRef:
                name: jira-issue-fetcher-filter-env
            resources:
              limits:
                cpu: "200m"
                memory: "128Mi"
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop:
                - ALL
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          dnsPolicy: ClusterFirst
          schedulerName: default-scheduler
          terminationGracePeriodSeconds: 30
