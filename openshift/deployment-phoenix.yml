apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  annotations:
    image.openshift.io/triggers: |
      [
        {
          "from": {
            "kind": "ImageStreamTag",
            "name": "phoenix:prod"
          },
          "fieldPath": "spec.template.spec.containers[?(@.name==\"phoenix\")].image"
        }
      ]
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: phoenix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: phoenix
        deployment: phoenix
    spec:
      containers:
      - env:
        - name: PHOENIX_WORKING_DIR
          value: /mnt/data
        - name: PHOENIX_PORT
          value: "6006"
        image: phoenix:prod
        imagePullPolicy: Always
        name: phoenix
        ports:
        - containerPort: 4317
          protocol: TCP
        - containerPort: 6006
          protocol: TCP
        - containerPort: 9090
          protocol: TCP
        resources:
          limits:
            cpu: "500m"
            memory: 1Gi
          requests:
            cpu: "25m"
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /mnt/data
          name: phoenix-data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - name: phoenix-data
        persistentVolumeClaim:
          claimName: phoenix-data
