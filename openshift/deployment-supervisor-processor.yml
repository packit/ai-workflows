apiVersion: apps/v1
kind: Deployment
metadata:
  name: supervisor-processor
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: supervisor-processor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: supervisor-processor
        deployment: supervisor-processor
    spec:
      containers:
      - name: supervisor-processor
        image: 'supervisor:prod'
        imagePullPolicy: Always
        command:
        - /usr/bin/python
        args:
        - -m
        - supervisor.main
        - --debug
        - process
        envFrom:
        - configMapRef:
            name: chat-env
        - configMapRef:
            name: endpoints-env
        - secretRef:
            name: gitlab-env
        - configMapRef:
            name: jira-env
        - secretRef:
            name: jira-env
        - configMapRef:
            name: kerberos-env
        - secretRef:
            name: testing-farm-env
        resources:
            limits:
                cpu: "200m"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/secrets/redhat-ymir-agent.keytab
          name: redhat-ymir-agent-keytab
          subPath: redhat-ymir-agent.keytab
        - mountPath: /etc/secrets/jotnar-vertex-prod.json
          name: vertex-key
          subPath: jotnar-vertex-prod.json
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # TODO: this should be reset when we have enough data.
      terminationGracePeriodSeconds: 30
      volumes:
      - name: redhat-ymir-agent-keytab
        secret:
          secretName: redhat-ymir-agent-keytab  # pragma: allowlist secret
      - name: vertex-key
        secret:
          secretName: vertex-key
