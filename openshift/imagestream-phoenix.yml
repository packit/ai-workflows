apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: phoenix
spec:
  lookupPolicy:
    local: true
  tags:
    - name: prod
      from:
        kind: DockerImage
        name: quay.io/antbob/jotnar/phoenix:latest
      importPolicy:
        # Periodically query registry to synchronize tag and image metadata.
        scheduled: true
